name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: go
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Go version
        run: go version

      - name: Verify dependencies
        run: |
          go mod tidy
          git diff --exit-code

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race ./...

      - name: Verify compilation
        run: go build ./...
